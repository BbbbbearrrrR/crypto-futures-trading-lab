[supervisord]
nodaemon=false
logfile=/app/logs/supervisord.log
pidfile=/tmp/supervisord.pid
loglevel=info

[program:dashboard]
command=python dashboard/app.py
directory=/app
autostart=true
autorestart=true
stdout_logfile=/app/logs/dashboard.log
stderr_logfile=/app/logs/dashboard.log
priority=10

[program:paper_breakout]
command=python -u paper/paper_trade_breakout.py
directory=/app
autostart=true
autorestart=true
stdout_logfile=/app/logs/paper_breakout.log
stderr_logfile=/app/logs/paper_breakout.log
priority=20

